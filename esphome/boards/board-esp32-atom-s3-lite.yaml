###
# ESP settings
###
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
    version: latest
###
# Uart Settings
###
# https://shop.m5stack.com/products/atomic-rs485-base
# G6 = TX = SDB
# G5 = RX = SDA

# https://docs.m5stack.com/en/unit/rs485
# G2 = TX = SDB
# G1 = RX = SDA
uart:
  id: uart_modbus
  tx_pin: 2
  rx_pin: 1
  baud_rate: 19200
  data_bits: 8
  stop_bits: 1
  parity: EVEN
  debug:
    direction: BOTH
